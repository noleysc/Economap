name: Run Economap Scraper
on:
  workflow_dispatch: 
  schedule:
    - cron: '0 12 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm install
      - name: Install Browsers
        run: npx playwright install --with-deps chromium firefox
      - name: Run Scraper
        # The --loader flag tells Node how to handle TypeScript files in ESM mode
        run: NODE_OPTIONS="--loader ts-node/esm --no-warnings" npx ts-node scraper.ts
