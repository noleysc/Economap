name: Run Economap Scraper

on:
  workflow_dispatch:
    inputs:
      items:
        description: 'Comma-separated list of items to scrape'
        required: false
        default: 'banana'
      stores:
        description: 'Comma-separated list of stores (walmart,target,sams)'
        required: false
        default: 'walmart,target,sams'
  schedule:
    - cron: '0 12 * * *'
  push:
    branches: [main]
    paths:
      - 'scraper/**'
      - '.github/workflows/automated-scraper.yml'

concurrency:
  group: economap-scraper-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm test

  scrape:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      LOG_FORMAT: json
      HEADLESS: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run scraper
        env:
          SEARCH_ITEMS: ${{ github.event.inputs.items || 'banana' }}
          STORES: ${{ github.event.inputs.stores || 'walmart,target,sams' }}
          GITHUB_ACTIONS: 'true'
        run: npm run scrape -- --out=results.json
      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-results
          path: results.json
          if-no-files-found: ignore
